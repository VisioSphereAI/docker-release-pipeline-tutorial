<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }} | Flask Docker Sample</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('main.home') }}">🐳 Flask Docker</a>
        <span class="navbar-text text-warning ms-2 d-none d-lg-inline">
          <span class="user-avatar">{{ user.avatar }}</span>
          <span class="badge bg-success">Lv{{ user.level }}</span>
          <span class="badge bg-info">{{ user.points }}pts</span>
        </span>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link {% if title == 'Home' %}active{% endif %}" href="{{ url_for('main.home') }}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if title == 'Calendar' %}active{% endif %}" href="{{ url_for('main.calendar') }}">📅 Calendar</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if title == 'Tasks' %}active{% endif %}" href="{{ url_for('main.tasks') }}">✓ Tasks</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if title == 'Arcade' %}active{% endif %}" href="{{ url_for('main.games') }}">🎮 Games</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if title == 'Profile' %}active{% endif %}" href="{{ url_for('main.profile') }}">👤 Profile</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if title == 'Leaderboard' %}active{% endif %}" href="{{ url_for('main.leaderboard') }}">🏆 Leaderboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if title == 'About' %}active{% endif %}" href="{{ url_for('main.about') }}">About</a>
            </li>
            <li class="nav-item">
              <button class="nav-link btn btn-link" id="darkModeToggle" title="Toggle dark mode">🌙</button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="py-5">
      <div class="container">
        {% block content %}{% endblock %}
      </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-5">
      <p>&copy; {{ current_year }} Flask Docker Sample. Built with Python + Flask.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
